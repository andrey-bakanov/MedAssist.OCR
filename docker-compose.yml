version: '3.8'

services:
  ocr-api:
    build: .
    image: medassist-common-ocr-api
    container_name: medassist.common.ocr
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - med-assist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  med-assist:
    external: true
